[build]
builder = "nixpacks"

[build.nixpacksPlan.phases.install]
cmds = ["npm install -g pnpm@10.0.0 && pnpm install --frozen-lockfile"]

[build.nixpacksPlan.phases.build]
cmds = ["NODE_OPTIONS=--experimental-require-module pnpm db:generate && pnpm --filter @vendza/database build && pnpm --filter api build"]

[deploy]
startCommand = "node apps/api/dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
