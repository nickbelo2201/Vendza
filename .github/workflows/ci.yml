name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(corepack pnpm store path)" >> $GITHUB_OUTPUT
        working-directory: app

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-store-${{ hashFiles('app/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile
        working-directory: app

      - name: Generate Prisma client
        run: corepack pnpm db:generate
        working-directory: app
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Typecheck
        run: corepack pnpm typecheck
        working-directory: app

      - name: Build
        run: corepack pnpm build
        working-directory: app
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          DIRECT_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          REDIS_URL: redis://placeholder:6379
          NODE_ENV: production
          API_HOST: 0.0.0.0
          API_PORT: 3333
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_PARTNER_URL: http://localhost:3001
          NEXT_PUBLIC_API_URL: http://localhost:3333
          PAYMENT_PROVIDER: mercado_pago
          MERCADO_PAGO_ACCESS_TOKEN: placeholder
          MERCADO_PAGO_PUBLIC_KEY: placeholder
          WHATSAPP_DEFAULT_PHONE: 5511999999999
          ZAPI_INSTANCE_ID: placeholder
          ZAPI_TOKEN: placeholder
          ZAPI_CLIENT_TOKEN: placeholder
          TELEGRAM_BOT_TOKEN: placeholder
          TELEGRAM_WEBHOOK_SECRET: placeholder
          OPENROUTER_API_KEY: placeholder
          AI_MODEL: google/gemini-2.0-flash
          API_PUBLIC_URL: https://placeholder.vendza.app
          S3_ENDPOINT: https://placeholder.s3.amazonaws.com
          S3_ACCESS_KEY_ID: placeholder
          S3_SECRET_ACCESS_KEY: placeholder
          S3_BUCKET: placeholder
          STORE_SLUG: adega-demo
          PIX_ENCRYPTION_KEY: placeholder-encryption-key-32-characters-long
          SEED_STORE_SLUG: adega-demo
          SEED_STORE_NAME: Adega Demo
          SEED_STORE_WHATSAPP: 5511999999999
          SEED_OWNER_AUTH_USER_ID: 00000000-0000-0000-0000-000000000000
          SEED_OWNER_EMAIL: demo@vendza.app
          SEED_OWNER_NAME: Demo Owner
          SENTRY_DSN: https://placeholder@placeholder.ingest.sentry.io/placeholder
          NEXT_PUBLIC_SENTRY_DSN: https://placeholder@placeholder.ingest.sentry.io/placeholder
