name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  typecheck-and-build:
    name: Typecheck + Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(corepack pnpm store path)" >> $GITHUB_OUTPUT
        working-directory: app

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-store-${{ hashFiles('app/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile
        working-directory: app

      - name: Generate Prisma client
        run: corepack pnpm db:generate
        working-directory: app
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vendza

      - name: Typecheck
        run: corepack pnpm typecheck
        working-directory: app

      - name: Build (API)
        run: corepack pnpm --filter api build
        working-directory: app
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vendza
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          STORE_SLUG: adega-demo

      - name: Build (web-partner)
        run: corepack pnpm --filter web-partner build
        working-directory: app
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3333
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

      - name: Build (web-client)
        run: corepack pnpm --filter web-client build
        working-directory: app
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3333
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          STORE_SLUG: adega-demo

  e2e-smoke:
    name: E2E Smoke Tests (produção)
    runs-on: ubuntu-latest
    needs: typecheck-and-build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(corepack pnpm store path)" >> $GITHUB_OUTPUT
        working-directory: app

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-store-${{ hashFiles('app/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile
        working-directory: app

      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium
        working-directory: app/apps/e2e

      - name: Run E2E smoke tests
        run: npx playwright test --project=chromium
        working-directory: app/apps/e2e
        env:
          PLAYWRIGHT_BASE_URL: https://vendza-storefront.vercel.app
          PLAYWRIGHT_API_URL: https://vendza-production.up.railway.app
          CI: true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: app/apps/e2e/playwright-report/
          retention-days: 7
